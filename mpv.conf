#console
term-osd-bar=yes # displays a progress bar on the terminal
msg-color=yes
msg-module=yes

#Player
osd-bar=no
save-position-on-quit=yes
cursor-autohide=1000 # autohides the cursor after 1s
keep-open=yes
#input-ipc-server=/tmp/mpvsocket
hr-seek-framedrop=no
#no-resume-playback
ontop=yes
border=no
reset-on-next-file=audio-delay,mute,pause,speed,sub-delay
autofit=50%x50%
prefetch-playlist=yes
force-seekable=yes

#Screenshots
screenshot-template="/mnt/data/pictures/screenshots/Screenshot-%F-T%wH.%wM.%wS.%wT-F%{estimated-frame-number}"
screenshot-format=png					# Set screenshot format
screenshot-png-compression=0			# Range is 0 to 10. 0 being no compression.
screenshot-tag-colorspace=yes
screenshot-high-bit-depth=yes			# Same output bitdepth as the video

#Subs
sub-font="Clear Sans Bold"
sub-ass-vsfilter-blur-compat=yes		# Backward compatibility for vsfilter fansubs
sub-ass-scale-with-window=no			# May have undesired effects with signs being misplaced.
sub-auto=fuzzy                          # external subs don't have to match the file name exactly to autoload
sub-file-paths-append=ass               # search for external subs in these relative subdirectories
sub-file-paths-append=srt
sub-file-paths-append=sub
sub-file-paths-append=subs
sub-file-paths-append=subtitles
demuxer-mkv-subtitle-preroll            # try to correctly show embedded subs when seeking
embeddedfonts=yes						# use embedded fonts for SSA/ASS subs
sub-fix-timing=no                       # do not try to fix gaps (which might make it worse in some cases). Enable if there are scenebleeds.

#Audio
ao=pipewire
volume=100
volume-max=100
af-add='dynaudnorm=g=5:f=250:r=0.9:p=0.5' # Normalize Audio
#audio-normalize-downmix=yes
#audio-stream-silence=yes
audio-pitch-correction=yes
gapless-audio=yes
audio-channels=stereo

#Languages
alang=jpn,jp,Japanese,eng,en,English,pt,por,ptb,ptbr,pt-br,pt_br,Portuguese,Portugues #Audio in Japanese by Default
slang=pt,por,ptb,ptbr,pt-br,pt_br,Portuguese,Portugues,eng,en,English #Subtitles in Portuguese by Default

#Video
vo=gpu-next
hwdec=nvdec
gpu-context=x11vk
gpu-api=vulkan
fbo-format=rgba16hf
#x11-bypass-compositor=yes
#override-display-fps=144
#tone-mapping=bt.2446a

# ===== Dithering =====
dither-depth=auto
temporal-dither=yes
dither=fruit

# ===== Debanding =====
deband=yes # enabled by default
deband-iterations=4 # deband steps
deband-threshold=48 # deband strength
deband-range=16 # deband range
deband-grain=48 # dynamic grain: set to "0" if using the static grain shader

# ===== Motion Interpolation =====
video-sync=display-resample
interpolation=yes
tscale=oversample # smoothmotion
blend-subtitles=yes

# ===== Anti-Ringing =====
scale-antiring=0.7 # luma upscale deringing
dscale-antiring=0.7 # luma downscale deringing
cscale-antiring=0.7 # chroma upscale deringing

#Upscaling & Processing
glsl-shaders-clr
# luma upscaling
glsl-shaders="/home/fonseca/.config/mpv/shaders/ravu-zoom-r3.hook"
scale=ewa_lanczos
glsl-shaders-append="/home/fonseca/.config/mpv/shaders/SSimSuperRes.glsl"
# luma downscaling
# note: ssimdownscaler is tuned for mitchell and downscaling=no
glsl-shaders-append="/home/fonseca/.config/mpv/shaders/SSimDownscaler.glsl"
dscale=mitchell
linear-downscaling=no
# chroma upscaling and downscaling
glsl-shaders-append="/home/fonseca/.config/mpv/shaders/KrigBilateral.glsl"
cscale=ewa_lanczos
sigmoid-upscaling=yes
#glsl-shaders-append="/home/fonseca/.config/mpv/shaders/adaptive-sharpen4k.glsl"
no-scaler-resizes-only

#cache

cache=yes
# cache-secs=300
# Uses extra large RAM cache (needs cache=yes to make it useful).
demuxer-max-bytes=1800M
demuxer-max-back-bytes=1200M

# ===== Protocol Specific Configuration =====

[protocol.http]
hls-bitrate=max # use max quality for HLS streams
cache=yes
no-cache-pause # don't pause when the cache runs low

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http

# ===== File Type Profiles =====
# GIF Files
[extension.gif]

profile-desc=gif
cache=no
no-pause
loop-file=yes
